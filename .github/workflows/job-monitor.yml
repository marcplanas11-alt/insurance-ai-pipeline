name: EU Insurance Remote Job Monitor v2

on:
  schedule:
    # Daily job scan at 8am UTC (Mon-Fri)
    - cron: '0 8 * * 1-5'
    # Weekly digest on Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Which job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - check-jobs
          - scan-companies
          - weekly-digest

jobs:

  check-jobs:
    name: 🎯 Daily Job Scanner
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'all' || github.event.inputs.job_type == 'check-jobs')
      || (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1-5')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests reportlab

      # Fixed caching: use date-based keys so each day's cache persists
      # and falls back to the most recent previous day
      - name: Restore seen jobs cache
        uses: actions/cache/restore@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ hashFiles('seen_jobs.json') }}
          restore-keys: seen-jobs-

      - name: Restore job tracker cache
        uses: actions/cache/restore@v4
        with:
          path: job_tracker.csv
          key: tracker-${{ hashFiles('job_tracker.csv') }}
          restore-keys: tracker-

      - name: Run job hunter
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python job_hunter.py

      # Save caches with content hash — guarantees uniqueness
      - name: Save seen jobs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ hashFiles('seen_jobs.json') }}

      - name: Save job tracker cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: job_tracker.csv
          key: tracker-${{ hashFiles('job_tracker.csv') }}

  scan-companies:
    name: 🚀 Insurtech News Scanner
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'all' || github.event.inputs.job_type == 'scan-companies')
      || (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1-5')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore seen companies cache
        uses: actions/cache/restore@v4
        with:
          path: seen_companies.json
          key: companies-${{ hashFiles('seen_companies.json') }}
          restore-keys: companies-

      - name: Run company scanner
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python company_scanner.py

      - name: Save seen companies cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_companies.json
          key: companies-${{ hashFiles('seen_companies.json') }}

  weekly-digest:
    name: 📊 Weekly Digest
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'all' || github.event.inputs.job_type == 'weekly-digest')
      || (github.event_name == 'schedule' && github.event.schedule == '0 9 * * 1')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore job tracker cache
        uses: actions/cache/restore@v4
        with:
          path: job_tracker.csv
          key: tracker-${{ hashFiles('job_tracker.csv') }}
          restore-keys: tracker-

      - name: Send weekly digest
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python weekly_digest.py
