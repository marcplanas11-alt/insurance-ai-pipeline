name: Clean Bordereaux File

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch:
    inputs:
      sample_data:
        description: 'Run on built-in sample data (YES/NO)'
        required: false
        default: 'YES'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  clean-bordereaux:
    name: Clean Bordereaux File
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Prepare input file
        run: |
          python3 - << 'PYEOF'
          import os, glob, shutil, sys
          import pandas as pd

          os.makedirs('input', exist_ok=True)
          os.makedirs('output', exist_ok=True)

          files = [f for f in glob.glob('input/*')
                   if f.endswith(('.csv', '.xlsx', '.xls'))]

          if files:
              print(f"Found input file: {files[0]}")
          else:
              print("No input file — generating sample data...")
              df = pd.DataFrame({
                  'Policy Number':   ['POL001','POL001','POL003','POL004','POL005','POL006','POL007','POL008','POL009'],
                  'Insured Name':    ['Acme Pet Ltd','Acme Pet Ltd','Beta Animal Care','Gamma Vets SA','Delta Paws','Epsilon Dogs','Zeta Cats','Eta Reptiles','Theta Birds'],
                  'Inception Date':  ['01/01/2025','01/01/2025','15/03/2025','2025-06-01','01/09/2025','01/01/2025','01/02/2025','01/03/2025','01/04/2025'],
                  'Expiry Date':     ['01/01/2026','01/01/2026','14/03/2025','2026-06-01','01/09/2026','01/01/2026','01/02/2026','01/03/2026','01/04/2026'],
                  'Gross Premium':   ['£1,200.00','£1,200.00','€850.50','(500.00)','3400','£2,100.00','£875.50','£650.00','£1,800.00'],
                  'Currency':        ['GBP','GBP','eur','PESO','USD','GBP','GBP','GBP','GBP'],
                  'VetFees':         [
                      'limit of £5,000 per condition excess £250',
                      'limit of £5,000 per condition excess £250',
                      'maximum cover £10,000 annual excess £500',
                      'unlimited coverage for all conditions',
                      'coverage £2,500 no excess',
                      'limit £8,000 per condition excess £100',
                      'maximum £3,000 excess £200',
                      'cover up to £4,500 excess £150',
                      'limit of £12,000 excess £350',
                  ],
                  'ClaimLimit':      [5000,5000,10000,None,2500,8000,3000,4500,12000],
                  'AnnualPremiumAmount': [1200,1200,850,500,3400,2100,875,650,1800],
              })
              df.to_csv('input/sample_bordereaux.csv', index=False)
              print(f"Sample file created: {len(df)} rows")
          PYEOF

      - name: Run cleaning pipeline
        run: |
          python3 - << 'PYEOF'
          import sys, os, glob
          sys.path.insert(0, '.')
          import pandas as pd
          from datetime import datetime
          from src.bordereaux_cleaner import clean_bordereaux
          from src.clean import clean_vetfees_column
          from src.parse import parse_vetfees

          os.makedirs('output', exist_ok=True)

          files = [f for f in glob.glob('input/*')
                   if f.endswith(('.csv', '.xlsx', '.xls'))]
          if not files:
              print("ERROR: No input file found in input/")
              sys.exit(1)

          filepath = files[0]
          df_raw = pd.read_csv(filepath) if filepath.endswith('.csv') else pd.read_excel(filepath)

          ts = datetime.now().strftime('%Y-%m-%d %H:%M')
          print(f"\n{'='*60}")
          print(f"  BORDEREAUX CLEANER — {ts}")
          print(f"{'='*60}")
          print(f"  Source:     {os.path.basename(filepath)}")
          print(f"  Input rows: {len(df_raw)}")
          print(f"  Columns:    {list(df_raw.columns)}")

          # Stage 1: bordereaux cleaning
          df_clean, report, issues = clean_bordereaux(df_raw)

          print(f"\nQUALITY REPORT")
          print("-" * 40)
          print(f"  Rows after cleaning:  {report['total_rows']}")
          print(f"  Date errors:          {report['date_errors']}")
          print(f"  Invalid currencies:   {report['invalid_currencies']}")
          if report.get('total_premium'):
              print(f"  Total premium:        {report['total_premium']:,.2f}")
              print(f"  Average premium:      {report['avg_premium']:,.2f}")
          if issues:
              print(f"\nSTRUCTURAL ISSUES:")
              for i in issues:
                  print(f"  WARNING: {i}")
          else:
              print(f"\n  No structural issues.")

          # Stage 2: VetFees parsing
          vetfees_col = None
          for col in df_clean.columns:
              if 'vetfee' in col.lower():
                  vetfees_col = col
                  break

          if vetfees_col:
              print(f"\nVETFEES PARSING — column: {vetfees_col}")
              df_clean = clean_vetfees_column(df_clean, column=vetfees_col)
              df_clean = parse_vetfees(df_clean, column=f"{vetfees_col}_clean")
              status = df_clean['parse_status'].value_counts()
              for s, n in status.items():
                  print(f"  {s}: {n}")

          # Save outputs
          file_ts = datetime.now().strftime('%Y%m%d_%H%M')
          out_clean = f'output/bordereaux_CLEAN_{file_ts}.xlsx'
          df_clean.to_excel(out_clean, index=False)
          print(f"\nSaved: {out_clean}")

          # Errors-only file
          mask = pd.Series(False, index=df_clean.index)
          for col in ['date_error', 'has_missing_required']:
              if col in df_clean.columns:
                  mask = mask | df_clean[col].fillna(False)
          if 'currency_valid' in df_clean.columns:
              mask = mask | (~df_clean['currency_valid'].fillna(True))
          if mask.sum() > 0:
              err_path = f'output/bordereaux_ERRORS_{file_ts}.xlsx'
              df_clean[mask].to_excel(err_path, index=False)
              print(f"Saved: {err_path} ({mask.sum()} row(s) flagged)")

          # Text report
          report_path = f'output/quality_report_{file_ts}.txt'
          with open(report_path, 'w') as f:
              f.write(f"BORDEREAUX QUALITY REPORT\n")
              f.write(f"Generated: {ts}\n")
              f.write(f"Source: {os.path.basename(filepath)}\n")
              f.write("=" * 40 + "\n")
              for k, v in report.items():
                  f.write(f"{k}: {v}\n")
              if issues:
                  f.write("\nISSUES:\n")
                  for i in issues:
                      f.write(f"  - {i}\n")
          print(f"Saved: {report_path}")

          print(f"\n{'='*60}")
          print(f"  DONE — download outputs from Artifacts below")
          print(f"{'='*60}")
          PYEOF

      - name: Upload outputs as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bordereaux-cleaned-${{ github.run_number }}
          path: output/
          retention-days: 30
          if-no-files-found: warn
